name: itp4511-project

services:
  database:
    image: mariadb:11
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3306:3306"
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "true"
      MARIADB_DATABASE: itp4511_db
      MARIADB_USER: itp4511
      MARIADB_PASSWORD: itp4511
      MARIADB_ROOT_PASSWORD: ""
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    tmpfs:
      - /var/lib/mysql
